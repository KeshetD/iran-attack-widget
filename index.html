<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סיכויים לתקיפה באיראן</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      direction: rtl;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .widget {
      background: #fff;
      border: 1px solid #ddd;
      width: 100%;
      max-width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .widget-header {
      background: #e8192c;
      color: #fff;
      text-align: center;
      padding: 12px 16px;
      font-size: 17px;
      font-weight: bold;
    }

    .widget-body { padding: 20px; }

    .stat-block { margin-bottom: 20px; text-align: center; }
    .stat-block:last-child { margin-bottom: 0; }

    .circle-wrap { position: relative; width: 120px; height: 120px; margin: 0 auto 10px; }
    .circle-wrap svg { width: 120px; height: 120px; transform: rotate(-90deg); }
    .circle-bg { fill: none; stroke: #e0e0e0; stroke-width: 8; }
    .circle-arc { fill: none; stroke-width: 8; stroke-linecap: round; }
    .circle-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); text-align: center;
    }
    .circle-pct { font-size: 28px; font-weight: 900; line-height: 1; display: block; }

    .stat-label { font-size: 13px; color: #555; text-align: center; }
    .widget-divider { border: none; border-top: 1px solid #e5e5e5; margin: 16px 0; }

    .widget-footer {
      background: #f9f9f9;
      border-top: 1px solid #eee;
      padding: 8px 16px;
      font-size: 10px;
      color: #aaa;
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-header">הסיכויים לתקיפה</div>
    <div class="widget-body">

      <div class="stat-block">
        <div class="circle-wrap">
          <svg viewBox="0 0 100 100">
            <circle class="circle-bg" cx="50" cy="50" r="38"/>
            <circle class="circle-arc" id="arc1" cx="50" cy="50" r="38"
              stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
          </svg>
          <div class="circle-text">
            <span class="circle-pct" id="pct1">—</span>
          </div>
        </div>
        <div class="stat-label" id="lbl1">ב-24 השעות הקרובות</div>
      </div>

      <hr class="widget-divider">

      <div class="stat-block">
        <div class="circle-wrap">
          <svg viewBox="0 0 100 100">
            <circle class="circle-bg" cx="50" cy="50" r="38"/>
            <circle class="circle-arc" id="arc2" cx="50" cy="50" r="38"
              stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
          </svg>
          <div class="circle-text">
            <span class="circle-pct" id="pct2">—</span>
          </div>
        </div>
        <div class="stat-label" id="lbl2">בשבוע הקרוב</div>
      </div>

    </div>
    <div class="widget-footer">עדכון אחרון: <span id="lastUpdate">—</span></div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // ✏️  עורכים: שנו רק את הערכים כאן
    // ─────────────────────────────────────────────
    const DATA = {
      pct1:   2,
      label1: 'ב-24 השעות הקרובות',
      pct2:   1,
      label2: 'בשבוע הקרוב'
    };
    // ─────────────────────────────────────────────

    const CIRC = 2 * Math.PI * 38;

    function gc(p) {
      return p <= 33 ? '#00b050' : p <= 66 ? '#f7941d' : '#e8192c';
    }

    function render(pctId, arcId, lblId, p, label) {
      const c = gc(p);
      const offset = CIRC - (p / 100) * CIRC;
      document.getElementById(pctId).textContent = p + '%';
      document.getElementById(pctId).style.color = c;
      document.getElementById(arcId).style.stroke = c;
      document.getElementById(arcId).style.strokeDashoffset = offset;
      document.getElementById(lblId).textContent = label;
    }

    render('pct1', 'arc1', 'lbl1', DATA.pct1, DATA.label1);
    render('pct2', 'arc2', 'lbl2', DATA.pct2, DATA.label2);

    // timestamp
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.toLocaleDateString('he-IL') + ' ' + now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
  </script>
</body>
</html>
